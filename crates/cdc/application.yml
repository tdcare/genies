#debug模式，true输出控制台日志，false只输出文件日志.生产环境需要关闭debug，rbatis也需移除"debug_mode"
debug: true
#名称
server_name: "cdc-service"
#server 地址
server_url: "0.0.0.0:8010"
#缓存介质类型,单选("mem","redis")
cache_type: "redis"
#redis地址(cache_type为“redis”时有效)
redis_url: "redis://122.9.125.181:6378"
#可持久化redis地址(cache_type为“redis”时有效)
redis_save_url: "redis://redis-save-service:6379"
#数据库地址
database_url: "mysql://tdnis:Tdcarefor123@122.9.125.181:13306/baseinfo_service?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8"
#数据库连接池参数
max_connections: 20
min_connections: 0
connect_timeout: 60
max_lifetime: 1800
idle_timeout: 120
test_before_acquire: true

#逻辑删除字段
logic_column: "del"
logic_un_deleted: 0
logic_deleted: 1
#日志文件存放目录
log_dir: "log/"
#日志通道最大缓存日志条数
log_cup: 50
#日志分割尺寸-单位KB,MB,GB
log_temp_size: "100MB"
#日志打包格式可选“”（空-不压缩）“gzip”（gz压缩包）“zip”（zip压缩包）“lz4”（lz4压缩包（非常快））
log_pack_compress: "zip"
#日志滚动保留-保留全部: All,按时间保留(秒): KeepTime(i64),按版本保留: KeepNum(i64)
log_rolling_type: "All"
#日志等级-info,error,warn,debug,trace
log_level: "debug"
#JwtToken秘钥
jwt_secret: "abs_admin"
#短信通道缓存（系统先把数据放入队列sms:send:，第三方短信sdk或程序需要从队列获取并发送，获得回执存入sms:resp:*）,格式为sms:send:手机号和sms:resp:手机号
sms_cache_send_key_prefix: "sms:send:"
#登陆失败拒绝策略，重试次数限制(0次无限制)
login_fail_retry: 3
#登陆失败重试次数限制超过后提示的等待时间（秒）
login_fail_retry_wait_sec: 30
# keycloak 参数
#keycloak_auth_server_certs: "http://122.9.125.181/auth/realms/tdcare/protocol/openid-connect/certs"

keycloak_auth_server_url: "http://122.9.125.181/auth/"
keycloak_realm: "tdcare"
keycloak_resource: "tdnis"
keycloak_credentials_secret: "701ef8cd-43b9-407e-80df-0dfc96c461dc"

# Dapr http 端口
dapr_http_port: 3500
dapr_http: http://localhost:3500

#Dapr cdc 参数
dapr_pubsub_name: messagebus
#每次投递消息的数量
dapr_pub_message_limit: 50
#time::Duration::from_millis(dapr_cdc_message_period);
dapr_cdc_message_period: 5000


#处理消息 最长的时间 单位 秒
processing_expire_seconds: 600
#消息处理成功后，状态保存的最长时间 单位 分钟
record_reserve_minutes: 10080

#接口白名单（免登陆直接访问）
white_list_api:
 - "/"
 - "/test/*"
 - "/test/keycloak"
 - "/admin/sys_login"
 - "/admin/captcha"
 - "/actors/*"
 - "/dapr/*"
 - "/system/*"
 - "/consumers/*"
 - "/consumers"


cdc:
 - baseinfo-service:
    database_url: "mysql://tdnis:Tdcare123for$@58.20.184.66:6006/baseinfo_service"
    dapr_pubsub_name: messagebus
     #每次投递消息的数量
    dapr_pub_message_limit: 50
     #set_frequency_repeated_by_seconds
    dapr_cdc_message_period: 1
    # 删除多少秒之前的消息
    clear_message_before_second: 172800
