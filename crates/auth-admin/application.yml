#debug模式
debug: true

#微服务名称
server_name: "auth-admin"

#微服务的路由前缀
servlet_path: "/auth-admin"

#server 地址
server_url: "0.0.0.0:9099"

#gateway
gateway: "http://127.0.0.1:6015"

#缓存介质类型
cache_type: "redis"

#redis地址
redis_url: "redis://:Tdcarefor123@127.0.0.1:6379"

#可持久化redis地址
redis_save_url: "redis://:Tdcarefor123@127.0.0.1:6379"

#数据库地址
database_url: "mysql://root:Tdcarefor123@127.0.0.1:3306/auth_admin_service"

#数据库连接池参数
max_connections: 20
min_connections: 0
wait_timeout: 60
max_lifetime: 1800
create_timeout: 120

#日志等级
log_level: "debug,flyway=info"


# 认证模式: 使用 auth-admin 本地JWT验证
auth_mode: "local"
auth_admin_url: "http://localhost:9099"
# JWT 配置（auth-admin 独有）
jwt_secret: "auth_admin_jwt_secret_change_in_production"
# JWT 过期时间（秒），默认 7200（2小时）
jwt_expires_in_secs: 7200
# 2FA 加密密钥（32字节 hex，用于加密 TOTP 密钥。留空则自动生成随机密钥，重启后旧密钥失效）
two_fa_encryption_key: "781b58689844f9be5e71ae751ed818f60d844851b7930165696978866b410ced"


# keycloak 参数（auth_mode="local" 时不需要配置）
# keycloak_auth_server_url: "http://example.com/auth/"
# keycloak_realm: "your-realm"
# keycloak_resource: "your-resource"
# keycloak_credentials_secret: "your-secret"


## Dapr 参数
dapr_pubsub_name: messagebus
dapr_pub_message_limit: 50
dapr_cdc_message_period: 5000

## 事件消费参数
processing_expire_seconds: 3600
record_reserve_minutes: 60

#接口白名单
white_list_api:
  - "/"
  - "/actors/*"
  - "/actuator/*"
  - "/dapr/*"
  - "/system/*"
  - "/daprsub/*"
  - "/daprsub"
  - "/login"
  - "/logout"
  - "/refresh-token"
